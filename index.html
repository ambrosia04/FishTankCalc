<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fish Stocking Calculator</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="Icon.png">
<!-- PDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="container">

<div class="left">

<h1>FISH STOCKING CALCULATOR</h1>

<h3>Always check with an expert or with other fishkeepers before making a decision, remember this is just an estimated number.</h3>

<div class="user">
<label>USER LEVEL</label> <br>
<select id="userLevel">
  <option value="beginner">Beginner</option>
  <option value="intermediate">Intermediate</option>
  <option value="expert">Expert</option>
</select>
</div>

<div class="tank" style="padding-top: 1%;">
    

<label>TANK SIZE</label>

<div class="tank-input">
    <!-- Main Tank Input -->
    <input type="number" id="tankSize" value="100" placeholder="Size">
    <select id="unit" onchange="convertTank()">
        <option value="liters">Liters</option>
        <option value="gallons">Gallons</option>
    </select>

    <!-- Dimension Calculator and Button -->
    <div class="dimension-calculator">
        <input type="number" id="dimLength" placeholder="L" min="1">
        <input type="number" id="dimWidth" placeholder="W" min="1">
        <input type="number" id="dimHeight" placeholder="H" min="1">
        <select id="dimUnit">
            <option value="cm">cm</option>
            <option value="inch">inch</option>
        </select>
        <button onclick="calculateTankFromDimensions()">Calc</button>
        
        <!-- Microfauna Button aligned in the same row -->
         
        <a href="Microfauna.html" class="btn-nav row-btn">Microfauna Guide</a>
        
        <a href="NitrogenCycle.html" class="btn-nav row-btn2">Nitrogen Cycle Guide</a>
    </div>
</div>

<label>Tank Type</label>
<select id="tankType" onchange="reloadTankType()">
<option value="freshwater">Freshwater</option>
<option value="brackish">Brackish</option>
<option value="marine">Marine</option>
</select>

<div style="display:flex; gap:15px; align-items:center; margin-top: 1%;">
    <label id="plantedLabel">Planted</label>
    <input type="checkbox" id="planted">

    <label id="hasSandLabel">Has Sand</label>
    <input type="checkbox" id="hasSand">
</div>

</div>

<hr>

<div>

<div class="fish-input-container">
    
    <label>FISH NAME</label>
    <div class="category-row">
        <button id="btn-fish" onclick="toggleCategory('fish')">🐟</button>
        <button id="btn-shrimp" onclick="toggleCategory('shrimp')">🦐</button>
        <button id="btn-snail" onclick="toggleCategory('snail')">🐌</button>
        <button id="btn-crab" onclick="toggleCategory('crab')">🦀</button>
        <button id="btn-stars" onclick="toggleCategory('stars')">⭐</button>
        <button id="btn-corals" onclick="toggleCategory('coral')">🪸</button>
    </div>
        
    <div class="fish-input-row">
        <input type="text" id="fishInput" placeholder="Type to filter...">
        <input type="number" id="amount" value="1" min="1">
        <button onclick="addFish()">Add</button>
    </div>
    <select id="fishSelect" size="8"></select>
</div>

</div>

<h2>Fish</h2>
<ul id="fishList"></ul>

<h2>Capacity</h2>
<div id="capacity"></div>
<div id="temperatureRange"></div>
<div id="phRange"></div>

<div id="warnings"></div>

</div>
<div class="right">
    <button onclick="generatePDF()" class="btn-nav" style="background: #27ae60;">Download Stocking Report</button>
    <h3>Converter (Liters/Gallons)</h3>
    <div class="inline-row">
        <input type="number" id="convertValue" min="1">
        <select id="convertFrom">
            <option value="liters">Liters</option>
            <option value="gallons">Gallons</option>
        </select>
        <button onclick="convertMini()">Convert</button>
    </div>
    <div id="convertResult"></div>

    <hr>

    <h3>Real Tank Volume</h3>
    <div class="calculator-column">
        <div class="input-group">
            <label>Mode</label>
            <select id="volumeMode" onchange="toggleVolumeMode()">
                <option value="liters">Known Volume</option>
                <option value="dimensions">Dimensions</option>
            </select>
        </div>

        <div id="volumeLiters" class="input-group">
            <label>Tank Size</label>
            <div class="inline-row">
                <input type="number" id="tankVolumeInput" placeholder="Tank Size"  min="1">
                <select id="tankVolumeUnit">
                    <option value="liters">Liters</option>
                    <option value="gallons">Gallons</option>
                </select>
            </div>
        </div>

        <div id="volumeDimensions" class="input-group" style="display:none">
            <label>Dimensions</label>
            <div class="dimension-grid">
                <input type="number" id="length" placeholder="Length" min="1">
                <input type="number" id="width" placeholder="Width" min="1">
                <input type="number" id="height" placeholder="Height" min="1">
                <select id="dimensionUnit">
                    <option value="cm">cm</option>
                    <option value="inch">inch</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Substrate (kg)</label>
            <input type="number" id="substrate" placeholder="0"  min="0">
        </div>

        <div class="input-group">
            <label>Big Rocks (10cm cubes)</label>
            <input type="number" id="rocks" placeholder="0" min="0">
        </div>

        <button onclick="calculateRealVolume()">Calculate Real Volume</button>
        <div id="realVolume"></div>
    </div>

    <hr>
    <a href="ammonia.html" class="btn-nav">Ammonia Calculator</a>
</div>

<script src="app.js"></script>

<!-- Add this right before the end of the <body> tag -->
<div id="fishPreview" style="display:none; position: fixed; z-index: 9999; pointer-events: none; background: #132938; padding: 5px; border-radius: 10px; border: 2px solid #1e90ff;">
    <img id="previewImg" src="" style="max-width: 200px; display: block; border-radius: 5px;">
</div>
</body>
</html>
