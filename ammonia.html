<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ammonia Calculator</title>
    <style>
        :root {
            --primary-color: #1e90ff;
            --hover-color: #1873cc;
            --bg-color: #0e1a24;
            --card-bg: #1a2a3a;
            --text-color: #ffffff;
            --input-bg: #2d3e50;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #34495e;
            padding-bottom: 20px;
        }

        .back {
            display: inline-block;
            padding: 10px 18px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .back:hover { background: var(--hover-color); }

        h1 { margin: 0; font-size: 1.8rem; }
        h3 { color: var(--primary-color); margin-top: 30px; border-bottom: 1px solid #34495e; padding-bottom: 5px; }

        /* Grid Layout for Inputs */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-with-unit {
            display: flex;
            gap: 5px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #bdc3c7;
        }

        input, select {
            background: var(--input-bg);
            border: 1px solid #34495e;
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 1rem;
            outline: none;
            width: 100%; /* Changed from 5% */
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary-color); }

        .calc-btn {
            background: var(--primary-color);
            border: none;
            color: white;
            padding: 15px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.1s, background 0.2s;
        }

        .calc-btn:active { transform: scale(0.98); }
        .calc-btn:hover { background: var(--hover-color); }

        .result {
            margin-top: 30px;
            background: #132938;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--primary-color);
            display: none; /* Hidden until calculated */
        }

        .result.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <a href="index.html" class="back">⬅ Back</a>
        <h1>Ammonia Cycling Calculator</h1>
    </div>

    <div class="grid-layout">
        <div class="input-group">
            <label>Tank Size</label>
            <div class="input-with-unit">
                <input type="number" id="amTank" placeholder="Enter size">
                <select id="amUnit" style="width: 120px;">
                    <option value="liters">Liters</option>
                    <option value="gallons">Gallons</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Target Ammonia (ppm)</label>
            <input type="number" id="ppm" value="2">
        </div>

        <div class="input-group">
            <label>Ammonia Concentration (%)</label>
            <input type="number" id="percent" value="10">
        </div>
    </div>

    <h3>System Information</h3>

    <div class="grid-layout">
        <div class="input-group">
            <label>Salinity (ppt)</label>
            <input type="number" id="salinity" value="35">
        </div>

        <div class="input-group">
            <label>Temperature</label>
            <div class="input-with-unit">
                <input type="number" id="temp" value="25">
                <select id="tempUnit" style="width: 120px;">
                    <option value="c">°C</option>
                    <option value="f">°F</option>
                </select>
            </div>
        </div>
    </div>

    <button class="calc-btn" onclick="calcAmmonia()">Calculate Dose</button>

    <div id="amResult" class="result"></div>
</div>

<script>
function calcAmmonia(){
    let size = parseFloat(document.getElementById("amTank").value);
    let unit = document.getElementById("amUnit").value;
    
    if(!size) { alert("Please enter a tank size"); return; }

    if(unit === "gallons"){
        size *= 3.78541; // More precise conversion
    }

    let ppm = parseFloat(document.getElementById("ppm").value);
    let percent = parseFloat(document.getElementById("percent").value);
    let salinity = parseFloat(document.getElementById("salinity").value);
    let temp = parseFloat(document.getElementById("temp").value);
    let tempUnit = document.getElementById("tempUnit").value;

    let tempC = (tempUnit === "f") ? (temp - 32) * 5/9 : temp;

    // Density correction (approximate for seawater)
    let density = 1 + (salinity * 0.0008);
    
    // Dosage formula: (Liters * ppm) / (Concentration% * 10)
    let result = (size * ppm) / (percent * 10);
    result *= density;

    let tempF = (tempC * 9/5) + 32;

    const resultDiv = document.getElementById("amResult");
    resultDiv.classList.add('active');
    resultDiv.innerHTML = `
        <div style="font-size: 1.2rem; margin-bottom: 10px;">
            <strong>Required Dose:</strong> <span style="color: #4cd137; font-size: 1.5rem;">${result.toFixed(2)} ml</span>
        </div>
        <div style="color: #bdc3c7; font-size: 0.9rem;">
            Based on ${tempC.toFixed(1)}°C (${tempF.toFixed(1)}°F) and ${salinity} ppt salinity.
        </div>
    `;
}
</script>

</body>
</html>
