<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitrogen Cycle Guide</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Icon.png">
    <style>
        .cycle-container { padding: 40px; max-width: 1200px; margin: auto; }
        
        .hero-img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 15px;
            border: 2px solid #1e90ff;
            margin-bottom: 30px;
            background: #132938;
        }

        .header-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            gap: 15px;
        }

        .back-row { width: 100%; display: flex; justify-content: flex-start; }

        .grid-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .cycle-card {
            background: #132938;
            border: 2px solid #8e44ad;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .cycle-card:hover { transform: scale(1.03); border-color: #1e90ff; }
        .cycle-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; }
        .cycle-card h3 { margin-top: 15px; color: #a0c4ff; }

        /* Modal Customization */
        #modalOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            overflow-y: auto;
        }

        .modal-content {
            background: #0e1a24;
            margin: 2% auto;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            border-radius: 15px;
            border: 2px solid #8e44ad;
            position: relative;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
            background: #132938;
            padding: 15px;
            border-radius: 10px;
        }

        .product-item {
            text-align: center;
            font-size: 0.85rem;
            color: white;
        }

        /* Update this to style your product images */
        .product-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 8px;
            background: #0e1a24;
            border-radius: 8px;
            border: 1px solid #8e44ad;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .fun-fact {
            background: #2c3e50;
            border-left: 5px solid #f1c40f;
            padding: 15px;
            margin: 20px 0;
            font-style: italic;
        }

        .back-arrow {
            position: absolute;
            top: 20px; left: 20px;
            font-size: 35px;
            color: #8e44ad;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="cycle-container">
    <div class="header-nav">
        <div class="back-row">
            <a href="index.html" class="btn-nav" style="margin-top:0;">← Back to Calculator</a>
        </div>
        <img src="Nitrogen/NitrogenCycle.jpg" alt="Nitrogen Cycle Diagram" class="hero-img" onerror="this.alt='Nitrogen Cycle Diagram (Image Missing)'">
        <h1 style="color: #8e44ad; margin-top: 0;">The Nitrogen Cycle Guide</h1>
        <p style="text-align: center; color: #a0c4ff;">The process of establishing beneficial bacteria to make your water safe for inhabitants.</p>
    </div>

    <div class="grid-gallery" id="cycleGrid"></div>
</div>

<div id="modalOverlay">
    <div class="modal-content">
        <span class="back-arrow" onclick="closeModal()">←</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    const cycleData = [
        {
            title: "Fishless Cycling",
            img: "Nitrogen/fishless.jpg",
            description: "The most humane method. You provide an ammonia source without any fish in the tank. You wait for bacteria to grow until the tank can process 2ppm of ammonia into Nitrates in 24 hours.",
            steps: "1. Fill tank. 2. Add ammonia. 3. Add bottled bacteria. 4. Wait and test daily.",
            products: [
                { name: "Pure Ammonia", img: "Nitrogen/Products/ammonia.jpg" },
                { name: "Bottled Bacteria", img: "Nitrogen/Products/bacteria.jpg" },
                { name: "API Master Test Kit", img: "Nitrogen/Products/testkit.jpg" },
                { name: "Test Strips", img: "Nitrogen/Products/teststrips.jpg" }
            ],
            fact: "This is the safest way to start because you don't risk the lives of any fish during the dangerous ammonia spikes."
        },
        {
            title: "Snail Cycling",
            img: "Nitrogen/snails.jpg",
            description: "A middle-ground approach. Hardy snails (like Ramshorn, Bladder, or Mystery snails) are introduced to provide a bioload. Snails are generally more tolerant of rising ammonia levels than fish, but still require monitoring.",
            steps: "1. Introduce 1-2 hardy snails. 2. Feed them very lightly. 3. Monitor Ammonia/Nitrite levels. 4. Use water conditioners and/or do a water change if levels rise too high.",
            products: [
                { name: "Hardy Snails", img: "Nitrogen/Products/snails.jpg" },
                { name: "Algae Wafers", img: "Nitrogen/Products/wafers.jpg" },
                { name: "Seachem Prime", img: "Nitrogen/Products/prime.jpg" }
            ],
            fact: "Snails are often called 'biological indicators.' If you see them all rushing to the very top of the waterline at once, it's often a sign that your ammonia or nitrite levels have spiked!"
        },
        {
            title: "Fish-In Cycling",
            img: "Nitrogen/fishin.jpg",
            description: "An emergency method or for experienced keepers. A small number of hardy fish are used to provide ammonia. This requires daily water testing and frequent water changes.",
            steps: "1. Add very few hardy fish. 2. Test water every 12 hours. 3. Perform water changes if Ammonia > 0.25ppm. 4. Use detoxifiers like Seachem Prime.",
            products: [
                { name: "Seachem Prime", img: "Nitrogen/Products/prime.jpg" },
                { name: "FritzZyme 7", img: "Nitrogen/Products/fritz7.jpg" },
                { name: "Water Siphon", img: "Nitrogen/Products/siphon.jpg" }
            ],
            fact: "Many keepers use Seachem Prime every 24-48 hours during this process because it temporarily detoxifies ammonia and nitrite without stopping the cycle."
        },
        {
            title: "Ghost Feeding",
            img: "Nitrogen/ghost.jpg",
            description: "A version of fishless cycling where you 'feed' an empty tank with fish food if you don't have ammonia available. As the food rots, it releases ammonia to feed the bacteria.",
            steps: "1. Drop a small pinch of flakes daily. 2. Wait for it to decay. 3. Monitor levels. 4. Clean out 'sludge' once the cycle is complete.",
            products: [
                { name: "Fish Flakes", img: "Nitrogen/Products/flakes.jpg" },
                { name: "Shrimp Pellets", img: "Nitrogen/Products/pellets.jpg" },
                { name: "Mesh Bag", img: "Nitrogen/Products/meshbag.jpg" }
            ],
            fact: "This method is harder to control than pure ammonia because you don't know exactly how much ammonia the rotting food will release."
        },
        {
            title: "Pure Ammonia Dosing",
            img: "Nitrogen/pure.jpg",
            description: "Using laboratory-grade Ammonium Chloride to reach a specific concentration (usually 2-4ppm). It is very precise and clean. You can use ammonia with water but never use ammonia with surfactants or fragrances. To make sure you have the right ammonia, look for 'pure ammonia' or 'ammonium chloride' with no additives and shake it to see if it bubbles and it stays, if it does, it's NOT pure.",
            steps: "1. Calculate volume. 2. Dose to 1-2ppm. 3. Re-dose when ammonia hits 0 AND Nitrite also hits 0.",
            products: [
                { name: "Dr. Tim's Ammonia", img: "Nitrogen/Products/drtims.jpg" },
                { name: "Pure Ammonia", img: "Nitrogen/Products/ammonia.jpg" },
                { name: "Precision Pipette", img: "Nitrogen/Products/pipette.jpg" },
                { name: "Liquid Test Kit", img: "Nitrogen/Products/testkit.jpg" },
                { name: "Test Strips", img: "Nitrogen/Products/teststrips.jpg" }
            ],
            fact: "Fun Fact: In the early days of the hobby, some people used their own urine as an ammonia source! While it technically works, it is NOT recommended as it can introduce unwanted hormones or medications into the water."
        },
        {
            title: "Established Media (Seeding)",
            img: "Nitrogen/seeding.jpg",
            description: "The 'cheat code' of fishkeeping. By taking a sponge or ceramic rings from a healthy, established tank, you 'seed' your new filter with millions of live bacteria.",
            steps: "1. Take 20-30% of media from an old filter. 2. Place it directly into the new filter. 3. Add a small ammonia source immediately to keep them alive.",
            products: [
                { name: "Filter Sponge", img: "Nitrogen/Products/sponge.jpg" },
                { name: "Ceramic Rings", img: "Nitrogen/Products/rings.jpg" },
                { name: "Mesh Filter Bag", img: "Nitrogen/Products/meshbag.jpg" }
            ],
            fact: "Using established media can cut your cycling time from 4-6 weeks down to just a few days or even instantly!"
        },
        {
            title: "Cycling With Plants",
            img: "Nitrogen/plants.jpg",
            description: "Also known as a 'Silent Cycle.' Live plants naturally consume ammonia and nitrates. If you heavily plant a tank from day one, you may never see an ammonia spike. Floaters are known to be especially good at this.",
            steps: "1. Plant heavily. 2. Use 'In-Vitro' plants for a pest-free start. 3. If using standard plants, perform a dip to kill snails/pests.",
            products: [
                { name: "Plant Fertilizer", img: "Nitrogen/Products/ferts.jpg" },
                { name: "Rich aquarium soil (like Aquasoil)", img: "Nitrogen/Products/aquasoil.jpg" },
                { name: "Alum (for dips)", img: "Nitrogen/Products/alum.jpg" }
            ],
            fact: "To clean plants: Use a 1:20 bleach-to-water dip for hardy plants (Anubias) for 2 minutes. For delicate plants, use a Hydrogen Peroxide dip or Alum to avoid melting them. In-Vitro plants (cups) are grown in labs and are 100% clean!"
        },
        {
            title: "Cycling Without Plants",
            img: "Nitrogen/noplants.jpg",
            description: "Traditional cycling focusing only on the filter and substrate. Common for African Cichlid tanks or 'Hardscape only' designs. A Darkstart is a 4-6 week period where the aquarium runs without lighting, CO2 addition, liquid fertilizer, or plants, and without livestock. This allows the beneficial bacteria to establish without any competition from algae or plants, and is especially useful for tanks that will eventually be low-light or have few plants.",
            steps: "1. Focus on high-surface-area media. 2. Increase oxygen (aeration) as bacteria need it to grow. 3. Keep the lights off to prevent algae during the cycle.",
            products: [
                { name: "Bio-Media", img: "Nitrogen/Products/biomedia.jpg" },
                { name: "Air Pump", img: "Nitrogen/Products/airpump.jpg" },
                { name: "Dark Start", img: "Nitrogen/Products/darkstart.jpg" }
            ],
            fact: "Without plants to help, you are 100% dependent on your filter's biological capacity. Never wash your filter media fully in tap water, or the chlorine will kill all your hard-earned bacteria!"
        }
    ];

    const grid = document.getElementById('cycleGrid');
    const modal = document.getElementById('modalOverlay');
    const modalBody = document.getElementById('modalBody');

    cycleData.forEach(item => {
        const card = document.createElement('div');
        card.className = 'cycle-card';
        card.innerHTML = `
            <img src="${item.img}" onerror="this.src='Icon.png'">
            <h3>${item.title}</h3>
        `;
        card.onclick = () => openModal(item);
        grid.appendChild(card);
    });

    function openModal(item) {
        let productsHTML = item.products.map(p => `
            <div class="product-item">
                <img src="${p.img}" class="product-img" onerror="this.src='Icon.png'">
                ${p.name}
            </div>
        `).join('');

        modalBody.innerHTML = `
            <h1 style="color:#8e44ad; text-align:center;">${item.title}</h1>
            <div style="text-align:center;"><img src="${item.img}" style="width:100%; max-height:300px; object-fit:cover; border-radius:10px;" onerror="this.style.display='none'"></div>
            
            <div style="margin-top:20px; line-height:1.6;">
                <p><strong>Overview:</strong> ${item.description}</p>
                <p><strong>Basic Steps:</strong> ${item.steps}</p>
            </div>

            <div class="fun-fact"><strong>Did you know?</strong><br>${item.fact}</div>

            <h3 style="color:#a0c4ff;">Recommended Tools/Products:</h3>
            <div class="product-grid">${productsHTML}</div>
        `;
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onclick = (e) => { if (e.target == modal) closeModal(); }
</script>

</body>
</html>
